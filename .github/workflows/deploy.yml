name: Deploy GitHub Pages
on:
  # 当推送到 main 分支时触发
  push:
    branches: [main]
  # 可选：允许手动触发部署
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 失败时立即终止，避免无效步骤
    continue-on-error: false
    steps:
      # 拉取代码（包含所有历史提交，避免部分项目构建依赖）
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整历史，部分构建工具需要

      # 安装 Node.js（使用 24.x 版本范围，更灵活）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'

      # 安装依赖（强制使用 npm ci 代替 npm install，更稳定）
      - name: Install dependencies
        run: npm ci

      # 打包项目（增加错误输出，便于排查）
      - name: Build project
        run: npm run build --if-present

      # 部署到 GitHub Pages（核心修正）
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          publish_dir: ./dist          # 打包后的目录
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # 关键：禁用 Jekyll，避免 _assets/_dist 等目录被忽略
          jekyll: false
          # 可选：部署后保留 gh-pages 分支的历史（避免分支体积过大）
          keep_files: false
          # 可选：设置提交信息
          commit_message: "Deploy: ${{ github.sha }}"
